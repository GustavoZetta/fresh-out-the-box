gridsize: 32 # multiplies height, width, x and y (32 * x, 32 * height...)
animations:
  "walking": # these names are the ones used in the code
    fps: 6
    frames: # has to be in order
      - x: 0
        y: 0
        width: 1
        height: 1
      - x: 1
        y: 0
        width: 1
        height: 1
      - x: 2
        y: 0
        width: 1
        height: 1
      - x: 3
        y: 0
        width: 1
        height: 1
  "idle":
    fps: 3
    frames:
      - x: 0
        y: 1
        width: 1
        height: 1
      - x: 1
        y: 1
        width: 1
        height: 1
      - x: 2
        y: 1
        width: 1
        height: 1
      - x: 3
        y: 1
        width: 1
        height: 1
      - x: 4
        y: 1
        width: 1
        height: 1